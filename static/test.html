<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Tre religioner</title>
    <style>
      .App {
	  height: 0 !important;
      } 
      .control {
	  position: absolute !important;
	  top: 80vh !important;
	  width: 50vw !important;
      }
      .splide__slide img {
	  width: 100%;
	  height: auto;
      }
      .splide__pagination__page.is-active {
	  background: #063746 !important;
      }
</style>
  </head>
  <body>
    <div id="fullscreen-slider" class="splide">
      <div class="splide__track">
	<ul class="splide__list" id="splides">
	</ul>
      </div>
    <div id="root"
	 data-azure-key="2e15e033f605414bbbfe26cb631ab755"
	 data-tdm-endpoint="https://9789127461239-tre-religioner-handler.eu2.ddd.tala.cloud/interact"
	 data-tts-voice="sv-SE, SofieNeural"
	 data-asr-language="sv-SE"
	 data-complete-timeout="3000">
    </div>
      
    </div>
    <script>
      const pages = [
	  "page_0",
	  "page_1",
	  "page_2",
	  "page_3",
	  "page_4",
	  "page_5",
	  "page_6",
      ]
      const listener = (event) => {
          window.availableDDDs = event.detail
	  for (let [i, pg] of pages.entries()) {
	      let li = document.createElement("li")
              li.className = "splide__slide"
	      let img = document.createElement("img")
              img.src = `./img/${pg}.png`
	      li.appendChild(img)
	      document.getElementById("splides").appendChild(li)
          }
	  var splide = new Splide( '#fullscreen-slider' , {
	      width : '100vw',
	      height: '100vh',
          });
	  splide.mount();
	  turnPage({"pageNumber": 0, "dddName": pages[0]});
	  splide.on( 'moved', function (newIndex) {
	      turnPage({"pageNumber": newIndex, "dddName": pages[newIndex]});
	      hideIfNoDDD(pages[newIndex])
	  } );
	  
      };
      window.addEventListener('setAvailableDDDs', listener);

      const turnPage = (segment) => {
	  if (!window.availableDDDs.includes(segment.dddName)) {
	      document.getElementById('root').style.display = 'none'
          } else {
	      document.getElementById('root').style.display = 'block'
          }
	  event = new CustomEvent('turnpage', { detail: segment });
	  window.dispatchEvent(event);
      }

</script>
